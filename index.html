---
layout: default
title: {{ site.name }}
---

<script id="dsq-count-scr" src="//vkein.disqus.com/count.js" async></script>
<div id="home">
  <h1>Blog Posts</h1>
  <ul class="posts">
    {% for post in site.posts %}
      <li><span>{{ post.date | date_to_string }}</span> &raquo; <a href="{{ site.baseurl }}{{ post.url }}#disqus_thread">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
</div>
